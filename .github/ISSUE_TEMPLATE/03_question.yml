name: "質問 / Question"
description: "使い方・設定に関する質問 / Ask how to use or configure Headshot"
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Headshot の使い方についての質問はこちら。
        Ask anything about how to use Headshot.

  - type: textarea
    id: question
    attributes:
      label: "質問内容 / Your Question"
      description: "具体的に教えてください。 / Please be as specific as possible."
      placeholder: "例: キャプチャのインターバルをページごとに変えることはできますか？"
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: "試したこと / What You've Tried (任意 / Optional)"
      description: "すでに試した設定や操作があれば書いてください。 / Describe what you've already tried."

  - type: input
    id: extension_version
    attributes:
      label: "拡張機能のバージョン / Extension Version (任意 / Optional)"
      description: "chrome://extensions で確認できます。 / Check at chrome://extensions"
      placeholder: "例: 1.2.0"
